            - paragraph [ref=e94]: Zimbabwean braai culture — grilled beef, goat, chicken, or sausage. Often seasoned with peri-peri or traditional spices.
            - paragraph [ref=e96]: "Cultural significance: Braai is a social institution in Zimbabwe. Weekend gatherings revolve around the fire and the grill."
