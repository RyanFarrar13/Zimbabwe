            - heading "Groundnut Stew (Nutsvi)" [level=3] [ref=e148]
            - paragraph [ref=e149]: A rich stew made with groundnut (peanut) paste, tomatoes, and meat. Served over sadza.
            - paragraph [ref=e151]: "Cultural significance: Groundnut stew is a comfort food that brings families together at the dinner table."
    - generic [ref=e153]:
      - heading "Braai Culture — More Than Just Grilling" [level=2] [ref=e154]
      - paragraph [ref=e155]: In Zimbabwe, the braai is a social institution. It's where families gather on weekends, friends share stories, and the aroma of grilled meat brings everyone together. From beef to boerewors, from peri-peri chicken to sausage — the braai is Zimbabwe's unofficial national pastime.
