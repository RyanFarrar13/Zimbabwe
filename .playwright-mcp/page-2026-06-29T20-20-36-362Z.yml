            - heading "Maheu" [level=3] [ref=e126]
            - paragraph [ref=e127]: A traditional fermented maize drink, thick and slightly sour. A refreshing non-alcoholic beverage.
            - paragraph [ref=e129]: "Cultural significance: Maheu is a traditional drink often made at home, especially in rural areas. It's nutritious and beloved by all ages."
