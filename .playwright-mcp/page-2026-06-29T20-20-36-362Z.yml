            - heading "Mopane Worms (Mhunga)" [level=3] [ref=e115]
            - paragraph [ref=e116]: Dried mopane caterpillars — a protein-rich delicacy. Usually rehydrated and cooked with onions, tomatoes, and chili.
            - paragraph [ref=e118]: "Cultural significance: Mopane worms are foraged during the rainy season (October–December) and dried for year-round use. A cherished snack."
