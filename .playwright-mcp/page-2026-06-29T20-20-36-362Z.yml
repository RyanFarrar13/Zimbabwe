            - heading "Muriwo (Wild Greens)" [level=3] [ref=e137]
            - paragraph [ref=e138]: Traditional leafy greens — including pumpkin leaves, sweet potato vines, and wild foraged varieties. Cooked into a nutritious stew.
            - paragraph [ref=e140]: "Cultural significance: Muriwo connects Zimbabweans to their land and ancestral cooking traditions."
