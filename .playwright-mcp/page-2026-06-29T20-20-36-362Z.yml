            - heading "Matemba (Small Fish)" [level=3] [ref=e104]
            - paragraph [ref=e105]: Tiny silver fish from Lake Kariba, usually fried or cooked in tomato sauce. A beloved delicacy.
            - paragraph [ref=e107]: "Cultural significance: Matemba season is a celebration — families gather to enjoy these small but mighty fish."
