            - heading "Sadza" [level=3] [ref=e82]
            - paragraph [ref=e83]: The staple food of Zimbabwe — a thick porridge made from ground maize (corn). Served with relish (vinaka), meat, vegetables, or dairy.
            - paragraph [ref=e85]: "Cultural significance: Sadza is the heart of every Zimbabwean meal. It represents unity, family, and cultural identity."
