            - heading "University of Zimbabwe" [level=3] [ref=e166]
            - paragraph [ref=e167]: Zimbabwe's oldest and largest university, founded in 1952. A leading research institution in Southern Africa with strengths in agriculture, medicine, engineering, and natural sciences.
        - generic [ref=e170]:
          - generic [ref=e172]: 🏛️
          - generic [ref=e173]:
            - heading "National University of Science and Technology (NUST)" [level=3] [ref=e174]
            - paragraph [ref=e175]: Located in Bulawayo, NUST is Zimbabwe's premier science and technology university. Known for breakthrough innovations — from granite-based batteries to water-skill championships — NUST drives applied research across engineering, mining, and clean energy.
        - generic [ref=e178]:
          - generic [ref=e180]: 🏛️
          - generic [ref=e181]:
            - heading "SIRDC — Scientific & Industrial Research and Development Centre" [level=3] [ref=e182]
            - paragraph [ref=e183]: Established by an Act of Parliament in 1993, SIRDC is Zimbabwe's premier applied research organization with twelve specialized institutes covering biotechnology, remote sensing, energy technology, materials science, and food technology. Over 200 researchers develop practical solutions for mining, agriculture, manufacturing, and the environment.
