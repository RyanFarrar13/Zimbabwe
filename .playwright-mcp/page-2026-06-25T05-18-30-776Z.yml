    - generic [ref=e39]:
      - heading "Traditional Dishes" [level=2] [ref=e40]
      - paragraph [ref=e41]: Zimbabwe's food culture is rich and diverse. Each dish carries centuries of tradition, connecting families across generations and regions.
      - generic [ref=e42]:
        - generic [ref=e43]:
          - img "Sadza — a traditional Zimbabwean dish from Nationwide" [ref=e45]
          - generic [ref=e46]: Nationwide
          - heading "Sadza" [level=3] [ref=e47]
          - paragraph [ref=e48]: The staple food of Zimbabwe — a thick porridge made from ground maize (corn). Served with relish (vinaka), meat, vegetables, or dairy.
          - paragraph [ref=e50]: "Cultural significance: Sadza is the heart of every Zimbabwean meal. It represents unity, family, and cultural identity."
        - generic [ref=e51]:
          - img "Nyama (Grilled Meat) — a traditional Zimbabwean dish from Nationwide" [ref=e53]
          - generic [ref=e54]: Nationwide
          - heading "Nyama (Grilled Meat)" [level=3] [ref=e55]
          - paragraph [ref=e56]: Zimbabwean braai culture — grilled beef, goat, chicken, or sausage. Often seasoned with peri-peri or traditional spices.
          - paragraph [ref=e58]: "Cultural significance: Braai is a social institution in Zimbabwe. Weekend gatherings revolve around the fire and the grill."
        - generic [ref=e59]:
          - img "Matemba (Small Fish) — a traditional Zimbabwean dish from Lake Kariba region" [ref=e61]
          - generic [ref=e62]: Lake Kariba region
          - heading "Matemba (Small Fish)" [level=3] [ref=e63]
          - paragraph [ref=e64]: Tiny silver fish from Lake Kariba, usually fried or cooked in tomato sauce. A beloved delicacy.
          - paragraph [ref=e66]: "Cultural significance: Matemba season is a celebration — families gather to enjoy these small but mighty fish."
        - generic [ref=e67]:
          - img "Mopane Worms (Mhunga) — a traditional Zimbabwean dish from Matabeleland, Lowveld" [ref=e69]
          - generic [ref=e70]: Matabeleland, Lowveld
          - heading "Mopane Worms (Mhunga)" [level=3] [ref=e71]
          - paragraph [ref=e72]: Dried mopane caterpillars — a protein-rich delicacy. Usually rehydrated and cooked with onions, tomatoes, and chili.
          - paragraph [ref=e74]: "Cultural significance: Mopane worms are foraged during the rainy season (October–December) and dried for year-round use. A cherished snack."
        - generic [ref=e75]:
          - img "Maheu — a traditional Zimbabwean dish from Nationwide" [ref=e77]
          - generic [ref=e78]: Nationwide
          - heading "Maheu" [level=3] [ref=e79]
          - paragraph [ref=e80]: A traditional fermented maize drink, thick and slightly sour. A refreshing non-alcoholic beverage.
          - paragraph [ref=e82]: "Cultural significance: Maheu is a traditional drink often made at home, especially in rural areas. It's nutritious and beloved by all ages."
        - generic [ref=e83]:
          - img "Muriwo (Wild Greens) — a traditional Zimbabwean dish from Nationwide" [ref=e85]
          - generic [ref=e86]: Nationwide
          - heading "Muriwo (Wild Greens)" [level=3] [ref=e87]
          - paragraph [ref=e88]: Traditional leafy greens — including pumpkin leaves, sweet potato vines, and wild foraged varieties. Cooked into a nutritious stew.
          - paragraph [ref=e90]: "Cultural significance: Muriwo connects Zimbabweans to their land and ancestral cooking traditions."
        - generic [ref=e91]:
          - img "Groundnut Stew (Nutsvi) — a traditional Zimbabwean dish from Nationwide" [ref=e93]
          - generic [ref=e94]: Nationwide
          - heading "Groundnut Stew (Nutsvi)" [level=3] [ref=e95]
          - paragraph [ref=e96]: A rich stew made with groundnut (peanut) paste, tomatoes, and meat. Served over sadza.
          - paragraph [ref=e98]: "Cultural significance: Groundnut stew is a comfort food that brings families together at the dinner table."
    - generic [ref=e100]:
      - heading "Braai Culture — More Than Just Grilling" [level=2] [ref=e101]
      - paragraph [ref=e102]: In Zimbabwe, the braai is a social institution. It's where families gather on weekends, friends share stories, and the aroma of grilled meat brings everyone together. From beef to boerewors, from peri-peri chicken to sausage — the braai is Zimbabwe's unofficial national pastime.
    - generic [ref=e104]:
      - heading "Taste of Zimbabwe" [level=2] [ref=e105]
      - paragraph [ref=e106]: Zimbabwe's food is more than sustenance — it's identity, community, and love on a plate. Every dish carries the warmth of Zimbabwean hospitality.
