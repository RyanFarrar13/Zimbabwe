            - paragraph [ref=e99]: Zimbabwe experienced a dramatic increase in mobile phone usage, with penetration rates exceeding 90% by the early 2020s. Mobile money services like EcoCash have revolutionized financial inclusion, enabling millions of unbanked Zimbabweans to participate in the digital economy.
