            - paragraph [ref=e123]: Zimbabwe maintains one of Africa's highest literacy rates at approximately 93%. The government has invested in expanding access to secondary education, with enrollment numbers growing steadily since the 2010s. University enrollment has also expanded beyond the traditional institutions.
